version: '3.8'

services:
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speedadmin-php
    restart: always
    volumes:
      - .:/var/www/html
      - ./docker/logs/php:/var/log
    environment:
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=speed_admin
      - DB_USERNAME=root
      - DB_PASSWORD=admin123
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: speedadmin-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/logs/nginx:/var/log/nginx
    depends_on:
      - php-fpm

  mysql:
    image: mysql:8.0
    container_name: speedadmin-mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/install.sql:/docker-entrypoint-initdb.d/install.sql
      - ./sql/alpha.sql:/docker-entrypoint-initdb.d/alpha.sql
    environment:
      - MYSQL_ROOT_PASSWORD=admin123
      - MYSQL_DATABASE=speed_admin
      - MYSQL_CHARSET=utf8mb4
      - MYSQL_COLLATION=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: speedadmin-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  mysql-data:
  redis-data: